name: Deploy to Plesk

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            APP_DIR="/var/www/vhosts/webcraftgroup.com/calvary.webcraftgroup.com/httpdocs"
            cd "$APP_DIR"

            # Initialize git if not present (Plesk stores .git elsewhere)
            if [ ! -d ".git" ]; then
              echo "Initializing git repo..."
              git init
              git remote add origin https://github.com/christimlee-ops/church-cms-ai.git
              git fetch origin main
              git reset --hard origin/main
            else
              git pull origin main
            fi

            echo "Now at commit: $(git rev-parse --short HEAD)"
            npm install --production=false
            npx prisma generate
            npm run build
            mkdir -p assets/_next
            rm -rf assets/_next/static
            cp -r .next/static assets/_next/static
            mkdir -p tmp
            touch tmp/restart.txt
            echo "Deploy complete."
