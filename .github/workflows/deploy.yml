name: Deploy to Plesk

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            APP_DIR="/var/www/vhosts/webcraftgroup.com/calvary.webcraftgroup.com/httpdocs"
            echo "Checking directory..."
            ls -la "$APP_DIR/.git" || echo "NO .git found at $APP_DIR"
            echo "Current user: $(whoami)"
            echo "Home: $HOME"
            echo "Trying cd..."
            cd "$APP_DIR" || { echo "FAILED to cd to $APP_DIR"; exit 1; }
            echo "Now in: $(pwd)"
            echo "Git status:"
            git status --short || echo "git status failed"
            echo "Pulling..."
            git pull origin main
            npm install --production=false
            npx prisma generate
            npm run build
            mkdir -p assets/_next
            rm -rf assets/_next/static
            cp -r .next/static assets/_next/static
            mkdir -p tmp
            touch tmp/restart.txt
            echo "Deploy complete. Commit: $(git rev-parse HEAD)"
