name: Deploy to Plesk

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            APP_DIR="/var/www/vhosts/webcraftgroup.com/calvary.webcraftgroup.com/httpdocs"
            git config --global --add safe.directory "$APP_DIR"
            cd "$APP_DIR"

            # Ensure git repo with correct remote
            if [ ! -d ".git" ]; then
              git init
            fi
            git remote remove origin 2>/dev/null || true
            git remote add origin https://github.com/christimlee-ops/church-cms-ai.git
            git fetch origin main
            git reset --hard origin/main

            echo "Now at commit: $(git rev-parse --short HEAD)"
            npm install --production=false
            npx prisma generate
            npm run build
            mkdir -p assets/_next
            rm -rf assets/_next/static
            cp -r .next/static assets/_next/static
            mkdir -p tmp
            touch tmp/restart.txt
            echo "Deploy complete."
